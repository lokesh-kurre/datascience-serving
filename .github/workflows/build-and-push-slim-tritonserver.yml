name: Build and Push Custom Triton Images

on:
  workflow_dispatch:
    inputs:
      triton_version:
        description: 'Triton Release Version (e.g., 24.04, 24.05)'
        required: true
        default: '24.04'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch with submodules
        uses: actions/checkout@v4
        with:
          ref: main
          submodules: recursive

      - name: Update submodule to target Triton release
        run: |
          cd extern/tritonserver
          git fetch --all --tags
          # Try branch strategy r24.04, fallback to tag strategy v24.04
          git checkout r${{ github.event.inputs.triton_version }} || git checkout v${{ github.event.inputs.triton_version }}
          cd ..

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u lokeshkurre --password-stdin

      - name: 1. Build Minimal Image
        run: make build TRITON_TAG=${{ github.event.inputs.triton_version }}

      - name: 2. Push Minimal Image
        run: make push-minimal TRITON_TAG=${{ github.event.inputs.triton_version }}

      - name: 3. Build and Push FastAPI Wrapper
        run: make push-fastapi-wrapper TRITON_TAG=${{ github.event.inputs.triton_version }}
